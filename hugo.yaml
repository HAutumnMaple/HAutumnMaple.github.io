baseURL: "https://HAutumnMaple.github.io/"
languageCode: "zh-cn"
title: "HAutumnMaple的博客"
theme: "PaperMod"

enableRobotsTXT: true
enableEmoji: true
hasCJKLanguage: true
disableHLJS: false

pagination:
  pagerSize: 10

languages:
  zh:
    languageName: "中文"
    weight: 1

taxonomies:
  category: "categories"
  tag: "tags"

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"

menu:
  main:
    - name: "首页"
      url: "/"
      weight: 1
    - name: "归档"
      url: "/archives/"
      weight: 2
    - name: "分类"
      url: "/categories/"
      weight: 3
    - name: "标签"
      url: "/tags/"
      weight: 4
    - name: "关于"
      url: "/about/"
      weight: 5
    - name: "搜索"
      url: "/search/"
      weight: 6

markup:
  highlight:
    noClasses: false
    lineNos: true
    lineNumbersInTable: true
    tabWidth: 4

params:
  author: "HAutumnMaple"
  description: "古之立大事者，不惟有超世之才，亦必有坚韧不拔之辈。#好心情持续营业 坏心情已经打烊#"

  defaultTheme: "auto"
  ShowReadingTime: true
  ShowCodeCopyButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowShareButtons: true
  ShowWordCount: true
  hideSummary: true

  comments: true
  commentsDefault: true

  homeInfoParams:
    Title: "HAutumnMaple"
    Content: |
      你好，我是 HAutumnMaple 👋  
      一名计算机相关专业学习者，欢迎来到我的博客

      我将在这里记录我的生活~

  socialIcons:
    - name: "github"
      url: "https://github.com/HAutumnMaple"
      title: "访问我的 GitHub"

    - name: "email"
      url: "mailto:huqidong25@mails.ucas.ac.cn"
      title: "发送邮件给我"